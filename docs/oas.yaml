openapi: "3.0.3"
info:
  title: EventSync API
  description: API for event management and real-time participant engagement
  version: "1.0.0"
  contact:
    name: EventSync
servers:
  - url: https://event-sync-backend-production.up.railway.app
    description: Production server
  - url: http://localhost:8080
    description: Local development server

# ─────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────
security: [ ]

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT required only for organizer (admin) routes

  # ─────────────────────────────────────────
  # SCHEMAS
  # ─────────────────────────────────────────
  schemas:

    # ── USER ────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        isAdmin:
          type: boolean
        email:
          type: string
          format: email
          nullable: true
        name:
          type: string
        joinDate:
          type: string
          format: date-time
      required: [ id, isAdmin, name ]

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        isAdmin:
          type: boolean

    # ── EVENT ────────────────────────────
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "DevConf 2026"
        description:
          type: string
          nullable: true
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        location:
          type: string
          example: "Paris Convention Center"
        createdBy:
          $ref: "#/components/schemas/User"
          nullable: true
      required: [ id, title, startDateTime, endDateTime, location ]

    EventCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        location:
          type: string
      required: [ title, startDateTime, endDateTime, location ]

    # ── SESSION ──────────────────────────────
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        capacity:
          type: integer
          nullable: true
        roomId:
          type: string
          format: uuid
          nullable: true
        speakers:
          type: array
          items:
            $ref: "#/components/schemas/SpeakerSummary"
        eventId:
          type: string
          format: uuid
      required: [ id, title, description, startTime, endTime, speakers, eventId ]

    SessionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        roomId:
          type: string
          format: uuid
          nullable: true
        speakers:
          type: array
          items:
            $ref: "#/components/schemas/SpeakerSummary"

    SessionCreate:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        capacity:
          type: integer
          minimum: 1
        roomId:
          type: string
          format: uuid
        speakersId:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
      required: [ eventId, title, description, startTime, endTime, capacity, roomId, speakersId ]

    # ── ROOM ────────────────────────────────
    Room:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Room A"
      required: [ id, name ]

    RoomCreate:
      type: object
      properties:
        name:
          type: string
      required: [ name ]

    # ── SPEAKER LINK ─────────────────────
    SpeakerLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        speakerId:
          type: string
          format: uuid
        platform:
          type: string
          enum: [ TWITTER, LINKEDIN, GITHUB, YOUTUBE, WEBSITE, OTHER ]
        url:
          type: string
        label:
          type: string
          nullable: true
      required: [ id, speakerId, platform, url ]

    SpeakerLinkCreate:
      type: object
      properties:
        platform:
          type: string
          enum: [ TWITTER, LINKEDIN, GITHUB, YOUTUBE, WEBSITE, OTHER ]
        url:
          type: string
        label:
          type: string
          nullable: true
      required: [ platform, url ]

    # ── SPEAKER ──────────────────────────
    Speaker:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        base64Picture:
          type: string
          nullable: true
          description: Base64 data URI of the speaker picture
        biography:
          type: string
          nullable: true
        links:
          type: array
          items:
            $ref: "#/components/schemas/SpeakerLink"
      required: [ id, firstName ]

    SpeakerSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        base64Picture:
          type: string
          nullable: true

    SpeakerCreate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        base64Picture:
          type: string
          description: Base64 data URI of the speaker picture
        biography:
          type: string
          nullable: true
        links:
          type: array
          items:
            $ref: "#/components/schemas/SpeakerLinkCreate"
      required: [ firstName, base64Picture ]

    # ── QUESTION ─────────────────────────────
    Question:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        user:
          $ref: "#/components/schemas/User"
          nullable: true
          description: Null if anonymous
        upvotes:
          type: integer
          default: 0
        createdAt:
          type: string
          format: date-time
      required: [ id, content, upvotes, createdAt ]

    QuestionCreate:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        isAnonymous:
          type: boolean
      required: [ content, isAnonymous ]

    # ── AUTH ─────────────────────────────────
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required: [ email, password ]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        name:
          type: string
          format: name
      required: [ email, password, name ]

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: "bearer"
        expires_in:
          type: integer
          example: 3600

    # ── ERRORS ──────────────────────────────
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required: [ code, message ]

# ─────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────
paths:
  # ── AUTH ─────────────────────────────────
  /auth/login:
    post:
      summary: Login
      tags: [ Auth ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/register:
    post:
      summary: Register a new user (open registration)
      tags: [ Auth ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Register successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/authStatus:
    post:
      summary: Check if authentication token is valid
      tags: [ Auth ]
      security:
        - BearerAuth: [ ]
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token is valid
        "401":
          description: Invalid or expired token

  # ── EVENTS ───────────────────────────────
  /events:
    get:
      summary: List all events (paginated)
      tags: [ Events ]
      parameters:
        - name: _start
          in: query
          schema:
            type: integer
            default: 0
        - name: _end
          in: query
          schema:
            type: integer
            default: 10
        - name: _sort
          in: query
          schema:
            type: string
            default: startDateTime
        - name: _order
          in: query
          schema:
            type: string
            enum: [ ASC, DESC ]
            default: ASC
        - name: id
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
          description: Filter by specific IDs
      responses:
        "200":
          description: List of events
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total number of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

    post:
      summary: Create an event
      tags: [ Events ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventCreate"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "401":
          description: Unauthorized

  /events/{eventId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Event details
      tags: [ Events ]
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found

    put:
      summary: Update an event
      tags: [ Events ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventCreate"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "401":
          description: Unauthorized
        "404":
          description: Event not found

    delete:
      summary: Delete an event
      tags: [ Events ]
      security:
        - BearerAuth: [ ]
      responses:
        "204":
          description: Event deleted
        "401":
          description: Unauthorized
        "404":
          description: Event not found

  # ── SESSIONS ─────────────────────────────
  /events/{eventId}/sessions:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: List sessions for an event (paginated)
      tags: [ Sessions ]
      parameters:
        - name: _start
          in: query
          schema:
            type: integer
            default: 0
        - name: _end
          in: query
          schema:
            type: integer
            default: 10
        - name: _sort
          in: query
          schema:
            type: string
            default: startTime
        - name: _order
          in: query
          schema:
            type: string
            enum: [ ASC, DESC ]
            default: ASC
      responses:
        "200":
          description: List of sessions
          headers:
            X-Total-Count:
              schema:
                type: integer
              description: Total number of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

    post:
      summary: Create a session
      tags: [ Sessions ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCreate"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /events/{eventId}/sessions/{sessionId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Session details
      tags: [ Sessions ]
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found

    put:
      summary: Update a session
      tags: [ Sessions ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCreate"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Session not found

    delete:
      summary: Delete a session
      tags: [ Sessions ]
      security:
        - BearerAuth: [ ]
      responses:
        "204":
          description: Session deleted
        "401":
          description: Unauthorized
        "404":
          description: Session not found

  /events/{eventId}/sessions/{sessionId}/register:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get registration count for a session
      tags: [ Sessions ]
      responses:
        "200":
          description: Registration count
          content:
            application/json:
              schema:
                type: integer
        "404":
          description: Session not found

    post:
      summary: Register current user for a session
      tags: [ Sessions ]
      security:
        - BearerAuth: [ ]
      responses:
        "201":
          description: Registered successfully
        "400":
          description: Session is full, already registered, or has already started
        "401":
          description: Unauthorized
        "404":
          description: Session not found

    delete:
      summary: Unregister from a session
      tags: [ Sessions ]
      security:
        - BearerAuth: [ ]
      responses:
        "204":
          description: Unregistered successfully
        "400":
          description: Session has already started or no registration found
        "401":
          description: Unauthorized
        "404":
          description: Session not found

  # ── QUESTIONS ────────────────────────────
  /events/{eventId}/sessions/{sessionId}/questions:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: List questions for a session (paginated)
      tags: [ Questions ]
      parameters:
        - name: _start
          in: query
          schema:
            type: integer
            default: 0
        - name: _end
          in: query
          schema:
            type: integer
            default: 10
        - name: _sort
          in: query
          schema:
            type: string
            default: upvotes
        - name: _order
          in: query
          schema:
            type: string
            enum: [ ASC, DESC ]
            default: ASC
        - name: id
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        "200":
          description: List of questions
          headers:
            X-Total-Count:
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "403":
          description: Session not live

    post:
      summary: Ask a question (live sessions only)
      tags: [ Questions ]
      security:
        - BearerAuth: [ ]
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionCreate"
      responses:
        "201":
          description: Question created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          description: Session not live
        "401":
          description: Unauthorized

    delete:
      summary: Delete all questions for a session (admin only)
      tags: [ Questions ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
      responses:
        "204":
          description: Questions deleted
        "401":
          description: Unauthorized

  /events/{eventId}/sessions/{sessionId}/questions/{questionId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: questionId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    delete:
      summary: Delete a question (admin only)
      tags: [ Questions ]
      security:
        - BearerAuth: [ ]
      responses:
        "204":
          description: Question deleted
        "401":
          description: Unauthorized

  /events/{eventId}/sessions/{sessionId}/questions/{questionId}/vote:
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: questionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: upvote
        in: query
        required: true
        schema:
          type: boolean

    post:
      summary: Upvote a question (live sessions only)
      tags: [ Questions ]
      security:
        - BearerAuth: [ ]
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upvote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          description: Session not live
        "401":
          description: Unauthorized
        "404":
          description: Question not found

  # ── ROOMS ───────────────────────────────
  /rooms:
    get:
      summary: List all rooms (paginated)
      tags: [ Rooms ]
      parameters:
        - name: _start
          in: query
          schema:
            type: integer
            default: 0
        - name: _end
          in: query
          schema:
            type: integer
            default: 10
        - name: _sort
          in: query
          schema:
            type: string
            default: name
        - name: _order
          in: query
          schema:
            type: string
            enum: [ ASC, DESC ]
            default: ASC
        - name: id
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        "200":
          description: List of rooms
          headers:
            X-Total-Count:
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

    post:
      summary: Create a room
      tags: [ Rooms ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomCreate"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "401":
          description: Unauthorized

  /rooms/{roomId}:
    parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Room details with its sessions
      tags: [ Rooms ]
      responses:
        "200":
          description: Room with sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Room"
                  - type: object
                    properties:
                      sessions:
                        type: array
                        items:
                          $ref: "#/components/schemas/SessionSummary"
        "404":
          description: Room not found

    put:
      summary: Update a room
      tags: [ Rooms ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomCreate"
      responses:
        "200":
          description: Room updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "401":
          description: Unauthorized
        "404":
          description: Room not found

    delete:
      summary: Delete a room
      tags: [ Rooms ]
      security:
        - BearerAuth: [ ]
      responses:
        "204":
          description: Room deleted
        "401":
          description: Unauthorized
        "404":
          description: Room not found

  # ── SPEAKERS ─────────────────────────────
  /speakers:
    get:
      summary: List all speakers (paginated)
      tags: [ Speakers ]
      parameters:
        - name: _start
          in: query
          schema:
            type: integer
            default: 0
        - name: _end
          in: query
          schema:
            type: integer
            default: 10
        - name: _sort
          in: query
          schema:
            type: string
            default: firstName
        - name: _order
          in: query
          schema:
            type: string
            enum: [ ASC, DESC ]
            default: ASC
        - name: id
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        "200":
          description: List of speakers
          headers:
            X-Total-Count:
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Speaker"

    post:
      summary: Create a speaker
      tags: [ Speakers ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeakerCreate"
      responses:
        "201":
          description: Speaker created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Speaker"
        "401":
          description: Unauthorized

  /speakers/{speakerId}:
    parameters:
      - name: speakerId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Speaker profile
      tags: [ Speakers ]
      responses:
        "200":
          description: Speaker profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Speaker"
        "404":
          description: Speaker not found

    put:
      summary: Update a speaker
      tags: [ Speakers ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeakerCreate"
      responses:
        "200":
          description: Speaker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Speaker"
        "401":
          description: Unauthorized
        "404":
          description: Speaker not found

    delete:
      summary: Delete a speaker
      tags: [ Speakers ]
      security:
        - BearerAuth: [ ]
      responses:
        "204":
          description: Speaker deleted
        "401":
          description: Unauthorized
        "404":
          description: Speaker not found

  # ── USERS ───────────────────────────────
  /users:
    get:
      summary: List all users (admin only)
      tags: [ Users ]
      security:
        - BearerAuth: [ ]
      parameters:
        - name: _start
          in: query
          schema:
            type: integer
            default: 0
        - name: _end
          in: query
          schema:
            type: integer
            default: 10
        - name: _sort
          in: query
          schema:
            type: string
            default: name
        - name: _order
          in: query
          schema:
            type: string
            enum: [ ASC, DESC ]
            default: ASC
        - name: id
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        "200":
          description: List of users
          headers:
            X-Total-Count:
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

    post:
      summary: Create a user (admin only)
      tags: [ Users ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "409":
          description: Email already in use

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get user by ID (admin only)
      tags: [ Users ]
      security:
        - BearerAuth: [ ]
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "404":
          description: User not found

    put:
      summary: Update a user (admin only)
      tags: [ Users ]
      security:
        - BearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "404":
          description: User not found

    delete:
      summary: Delete a user (admin only)
      tags: [ Users ]
      security:
        - BearerAuth: [ ]
      responses:
        "204":
          description: User deleted
        "401":
          description: Unauthorized
        "404":
          description: User not found

# ─────────────────────────────────────────
# TAGS
# ─────────────────────────────────────────
tags:
  - name: Auth
    description: Organizer authentication
  - name: Events
    description: Events CRUD
  - name: Sessions
    description: Sessions CRUD and scheduling
  - name: Questions
    description: Real-time Q&A (live sessions)
  - name: Rooms
    description: Room management and room view
  - name: Speakers
    description: Public profiles and management
  - name: Users
    description: User management (admin only)